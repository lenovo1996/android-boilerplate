## CONSTRAINTS
- Spec phải đủ chi tiết để developer có thể implement MÀI KHÔNG cần hỏi lại
- Mỗi feature phải có user stories, UI components, business logic
- Data models phải có field types và constraints
- Nếu app quá lớn, chia thành phases với MVP scope rõ ràng

## QUALITY CHECKLIST
Trước khi hoàn thành:
- [ ] Có executive summary?
- [ ] Tech stack đã recommend rõ ràng?
- [ ] Đủ screens với navigation flow?
- [ ] Mỗi feature có user stories + business logic?
- [ ] Data models có đủ fields và types?
- [ ] API endpoints đầy đủ?
- [ ] Monetization strategy chi tiết?
- [ ] Localization plan?
- [ ] Feasibility assessment realistic?
- [ ] Developer có thể implement từ spec này?